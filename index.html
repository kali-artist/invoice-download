<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发票测试数据下载</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f1117;
    --card:#1a1d27;
    --border:#2a2d3a;
    --text:#e4e4e7;
    --muted:#8b8d97;
    --accent:#10b981;
    --accent-hover:#0ea371;
    --file-size:14px;
  }
  body{
    font-family:'Noto Sans SC',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .container{
    max-width:440px;
    width:100%;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:40px 32px;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
  }
  .icon{
    width:64px;
    height:64px;
    margin:0 auto 24px;
    background:rgba(16,185,129,0.12);
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon svg{width:32px;height:32px}
  h1{
    font-size:20px;
    font-weight:700;
    margin-bottom:8px;
  }
  .subtitle{
    color:var(--muted);
    font-size:14px;
    margin-bottom:32px;
    line-height:1.6;
  }
  .file-info{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:12px;
    padding:16px;
    margin-bottom:28px;
    display:flex;
    align-items:center;
    gap:12px;
    text-align:left;
  }
  .file-icon{
    flex-shrink:0;
    width:40px;
    height:40px;
    background:rgba(16,185,129,0.1);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .file-icon span{
    font-family:'JetBrains Mono',monospace;
    font-weight:600;
    font-size:11px;
    color:var(--accent);
  }
  .file-details{flex:1;min-width:0}
  .file-name{
    font-size:14px;
    font-weight:500;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .file-meta{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .btn-download{
    display:block;
    width:100%;
    padding:14px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:12px;
    font-family:'Noto Sans SC',sans-serif;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:all 0.2s ease;
    text-decoration:none;
  }
  .btn-download:hover{
    background:var(--accent-hover);
    transform:translateY(-1px);
    box-shadow:0 6px 20px rgba(16,185,129,0.35);
  }
  .btn-download:active{transform:translateY(0)}
  .btn-download svg{
    width:20px;
    height:20px;
    vertical-align:middle;
    margin-right:8px;
  }
  .record-count{
    margin-top:20px;
    font-size:12px;
    color:var(--muted);
  }
  .record-count b{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){
    .btn-download{transition:none}
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="16" y2="17"/>
      </svg>
    </div>
    <h1>发票测试数据</h1>
    <p class="subtitle">包含发票代码、发票号码、合计金额、<br>校验码、开票日期等字段</p>

    <div class="file-info">
      <div class="file-icon"><span>XLSX</span></div>
      <div class="file-details">
        <div class="file-name">发票测试数据.xlsx</div>
        <div class="file-meta" id="fileMeta">Excel · 50 条记录</div>
      </div>
    </div>

    <a href="invoice-test-data.xlsx" download="发票测试数据.xlsx" class="btn-download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      下载文件
    </a>

    <p class="record-count">共 <b>50</b> 条测试数据 · 点击按钮即可下载</p>
  </div>
</div>
</body>
</html>
